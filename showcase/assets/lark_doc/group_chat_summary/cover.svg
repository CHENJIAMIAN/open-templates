<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Group Chat Summary Cover</title>
  <desc id="desc">Cover illustration for an open templates group chat summary example.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#18263f"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="36" fill="url(#bg)"/>
  <rect x="92" y="92" width="188" height="18" rx="9" fill="url(#chip)"/>
  <text x="92" y="188" fill="#f8fafc" font-size="58" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Group Chat Summary</text>
  <text x="92" y="242" fill="#cbd5e1" font-size="26" font-family="Segoe UI, Arial, sans-serif">Decisions, action items, risks, and owners at a glance</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="92" y="316" width="1016" height="292" rx="28" fill="#0f172a" opacity="0.74"/>
    <rect x="126" y="354" width="210" height="54" rx="18" fill="#1d4ed8"/>
    <text x="154" y="389" fill="#eff6ff" font-size="20" font-weight="700">Decisions</text>
    <rect x="364" y="354" width="214" height="54" rx="18" fill="#0f766e"/>
    <text x="396" y="389" fill="#ecfeff" font-size="20" font-weight="700">Action Items</text>
    <rect x="606" y="354" width="168" height="54" rx="18" fill="#b45309"/>
    <text x="650" y="389" fill="#fff7ed" font-size="20" font-weight="700">Risks</text>
    <rect x="802" y="354" width="196" height="54" rx="18" fill="#4c1d95"/>
    <text x="848" y="389" fill="#f5f3ff" font-size="20" font-weight="700">Owners</text>
    <g fill="#e2e8f0" font-size="18">
      <text x="126" y="452">Public launch scope agreed</text>
      <text x="126" y="488">Three showcase families selected</text>
      <text x="126" y="524">Strict validation mode added for release gating</text>
      <text x="126" y="560">Preview assets remain the next dependency</text>
    </g>
  </g>
  <text x="92" y="664" fill="#94a3b8" font-size="20" font-family="Segoe UI, Arial, sans-serif">Synthetic example for the open-templates repository</text>
</svg>
